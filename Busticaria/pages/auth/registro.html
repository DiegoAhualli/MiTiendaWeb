<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busticaria | Registro</title>
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>
    <header>
        <nav>
            <img src="../../img/logo.png" alt="Logo de Busticaria" width="100">
            <a href="../index.html">Home</a>
            <a href="../categories/categoria-tecnologia.html">Tecnología</a>
            <a href="../categories/categoria-ropa.html">Ropa</a>
            <a href="../categories/categoria-hogar.html">Hogar</a>
            <a href="login.html">Login</a>
            <a href="registro.html">Registro</a>
            <a href="#">Logout</a>
        </nav>
    </header>

    <main>
        <h1>Registro de usuario</h1>

        <form action="#" method="post">
            <div>
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre" required>
            </div>

            <div>
                <label for="apellido">Apellido:</label>
                <input type="text" id="apellido" name="apellido" placeholder="Ingrese su apellido" required>
            </div>

            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Ingrese su email" required>
            </div>

            <div>
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" required>
            </div>

            <div>
                <label for="fechaNacimiento">Fecha de nacimiento:</label>
                <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>
            </div>

            <button type="submit">Registrarse</button>
        </form>
    </main>
</body>
</html>
