<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Busticaria es una tienda online de productos de tecnología, ropa y hogar.">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/styles.css">

    <title>Busticaria</title>
</head>

<body>
    <header id="navbar"></header>

    <main>
        <section class="hero-busticaria">
            <div class="container">
                <h1>Bienvenidos a Busticaria</h1>
                <p>Tu tienda online para encontrar productos de tecnología, ropa y hogar.</p>
                <a href="#producto-destacado" class="btn btn-busticaria">Ver producto destacado</a>
            </div>
        </section>

        <section class="container py-5">
            <h2 class="mb-4">Categorías</h2>

            <div class="row g-3">
                <div class="col-md-4">
                    <a href="categories/categoria-tecnologia.html" class="category-card">Tecnología</a>
                </div>

                <div class="col-md-4">
                    <a href="categories/categoria-ropa.html" class="category-card">Ropa</a>
                </div>

                <div class="col-md-4">
                    <a href="categories/categoria-hogar.html" class="category-card">Hogar</a>
                </div>
            </div>
        </section>

        <section id="producto-destacado" class="container pb-5">
            <h2 class="mb-4">Producto destacado</h2>

            <div class="row">
                <div class="col-md-4">
                    <article class="card card-custom product-card">
                        <img src="../assets/img/logo2.webp" class="card-img-top product-card__img" alt="Producto destacado de Busticaria">

                        <div class="card-body">
                            <h3 class="card-title">Producto Busticaria</h3>

                            <p class="card-text">
                                Producto de ejemplo para representar una card dentro del ecommerce.
                            </p>

                            <p class="product-card__price">$25.000</p>

                            <a href="#" class="btn btn-busticaria w-100">Ver producto</a>
                        </div>
                    </article>
                </div>
            </div>
        </section>
    </main>

    <script src="../components/navbar.component.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
